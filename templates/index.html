<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">SMARTS Gate</p>
      <h1>QR Gate Scanner</h1>
      <p class="hero-copy">A clean view of the scanner, the barrier, and the reason it moves.</p>
    </header>

    <section class="dashboard-grid">
      <article class="card scanner-card">
        <div class="section-head">
          <p class="section-kicker">Scanner</p>
          <h2>QR Camera</h2>
        </div>

        <div class="scanner-frame">
          <video id="scannerVideo" class="scanner-video" playsinline muted></video>
          <div class="scanner-reticle" aria-hidden="true"></div>
        </div>

        <div class="scanner-actions">
          <button id="startScanner" class="action-btn primary">Start Scan</button>
          <button id="stopScanner" class="action-btn secondary">Stop Scan</button>
        </div>

        <p id="scannerStatus" class="scanner-status">Scanner idle.</p>
      </article>

      <article class="card gate-card">
        <div class="gate-head">
          <div>
            <p class="section-kicker">Gate</p>
            <h2 id="gateStateTitle">Gate closed</h2>
          </div>
          <span id="gateStatusPill" class="status-pill closed">CLOSED</span>
        </div>

        <div class="gate-stage">
          <div class="road-line"></div>
          <div class="gate-base"></div>
          <div id="barrierArm" class="barrier-arm"></div>
        </div>

        <div class="reason-card">
          <span class="reason-label">Status</span>
          <p id="gateReason">Closed while waiting for a QR ticket.</p>
        </div>
      </article>
    </section>
  </main>

  <script>
    window.SMARTS_CONFIG = {
      wsUrl: `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws`
    };
  </script>
  <script src="{{ url_for('static', path='vendor/jsQR.js') }}"></script>
  <script src="{{ url_for('static', path='app.js') }}"></script>
</body>
</html>
